{% extends "layout.html" %}
{% block title %}Error{% endblock %}
{% block content %}
<div style="max-width:550px;margin:3em auto;text-align:center;">
    <h2 style="font-size:1.6rem;color:#202124;">{{ error_title }}</h2>
    <p style="color:#5f6368;margin:1em 0;">{{ error_message }}</p>
    <a href="{{ url_for('home') }}" style="display:inline-block;padding:10px 28px;border-radius:24px;background:#4285F4;color:#fff;text-decoration:none;font-weight:500;">Back to Search</a>
</div>
{% endblock %}
