{% extends "layout.html" %}
{% block content %}

<!-- "Are you ready?" overlay — gates the search bar until confirmed -->
<div id="readyOverlay">
  <div class="overlay-inner">
    <h2>Sei pronto per iniziare?</h2>
    <p>Una volta iniziato, la tua sessione di ricerca verra registrata. Prenditi il tempo necessario per leggere il compito prima di procedere.</p>
    <button id="ready-btn" onclick="dismissReadyOverlay()">Sono pronto</button>
  </div>
</div>

<div class="home-search-center">
    <div class="home-search-title">
      <span class="sol-blue">S</span><span class="sol-red">O</span><span class="sol-yellow">L</span> <span class="sol-blue">S</span><span class="sol-red">e</span><span class="sol-yellow">a</span><span class="sol-blue">r</span><span class="sol-green">c</span><span class="sol-red">h</span>
    </div>

    <form method="POST" action="{{ url_for('result') }}" id="search-bar" class="home-search-form">
        {{ form.hidden_tag() }}
        <input
            type="search"
            name="query"
            id="search-box"
            placeholder="Cerca..."
            aria-label="Cerca"
            autocomplete="off">
        <button type="submit" name="submit-box" id="submit-box">Cerca</button>
    </form>
</div>

<script>
function dismissReadyOverlay() {
    document.getElementById('readyOverlay').style.display = 'none';
    if (window.studyLogger) {
        studyLogger.logEvent("readyToBeginConfirmed");
    }
}
</script>
{% endblock content %}
