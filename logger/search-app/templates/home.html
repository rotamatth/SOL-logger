{% extends "layout.html" %}
{% block content %}

<!-- "Are you ready?" overlay — gates the search bar until confirmed -->
<div id="readyOverlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,255,255,0.95);z-index:5000;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;max-width:500px;padding:2em;">
    <h2 style="font-size:1.8rem;color:#202124;margin-bottom:0.5em;">Sei pronto per iniziare?</h2>
    <p style="color:#5f6368;font-size:1rem;margin-bottom:1.5em;">Una volta iniziato, la tua sessione di ricerca verra registrata. Prenditi il tempo necessario per leggere il compito prima di procedere.</p>
    <button id="ready-btn" onclick="dismissReadyOverlay()" style="padding:12px 36px;border-radius:24px;border:1px solid #dadce0;background:#4285F4;color:#fff;font-size:1rem;font-weight:500;cursor:pointer;">Sono pronto</button>
  </div>
</div>

<div class="home-search-center">
    <div class="home-search-title">
      <span style="color:#4285F4">S</span><span style="color:#EA4335">O</span><span style="color:#FBBC05">L</span> <span style="color:#4285F4">S</span><span style="color:#EA4335">e</span><span style="color:#FBBC05">a</span><span style="color:#4285F4">r</span><span style="color:#34A853">c</span><span style="color:#EA4335">h</span>
    </div>

    <form method="POST" action="{{ url_for('result') }}" id="search-bar" class="home-search-form">
        {{ form.hidden_tag() }}
        <input
            type="search"
            name="query"
            id="search-box"
            placeholder="Cerca..."
            aria-label="Cerca"
            autocomplete="off">
        <button type="submit" name="submit-box" id="submit-box">Cerca</button>
    </form>
</div>

<script>
function dismissReadyOverlay() {
    document.getElementById('readyOverlay').style.display = 'none';
    if (window.studyLogger) {
        studyLogger.logEvent("readyToBeginConfirmed");
    }
}
</script>
{% endblock content %}
