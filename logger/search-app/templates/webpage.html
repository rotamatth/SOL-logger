{% extends "layout.html" %}
{% block title %}Web Page{% endblock %}
{% block content %}

<div class="viewer-back-wrapper">
    <a href="{{ url_for('result', query=query, page=page) }}" id="viewer-back-btn">
        ← Torna ai risultati
    </a>
</div>

<iframe
    id="webpage-frame"
    src="{{ url }}"
    sandbox="allow-same-origin allow-scripts allow-forms"
    title="Web page viewer">
</iframe>

<script>
if (window.studyLogger) {
    studyLogger.logEvent("webpageOpened", { url: "{{ url }}" });

    document.getElementById("viewer-back-btn").addEventListener("click", function() {
        studyLogger.logEvent("webpageClosed", { url: "{{ url }}" });
    });
}
</script>
{% endblock %}
